<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Keuangan Pribadi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-wallet mr-2"></i>MyBudget</h1>
        </div>
    </nav>

    <div class="container mx-auto p-4 mt-4">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm font-semibold">Total Saldo</h3>
                <p class="text-2xl font-bold text-gray-800" id="totalSaldo">Rp 0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                <h3 class="text-gray-500 text-sm font-semibold">Total Pemasukan</h3>
                <p class="text-2xl font-bold text-green-600" id="totalPemasukan">Rp 0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-red-500">
                <h3 class="text-gray-500 text-sm font-semibold">Total Pengeluaran</h3>
                <p class="text-2xl font-bold text-red-600" id="totalPengeluaran">Rp 0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-sm">
                    <h2 class="text-lg font-bold mb-4 border-b pb-2">Tambah Transaksi</h2>
                    <form id="formTransaksi">
                        <input type="hidden" id="inputId">
                        
                        <div class="mb-3">
                            <label class="block text-sm font-medium mb-1">Tanggal</label>
                            <input type="date" id="inputTanggal" class="w-full border p-2 rounded focus:ring-blue-500 focus:border-blue-500" required>
                        </div>
                        <div class="mb-3">
                            <label class="block text-sm font-medium mb-1">Jenis</label>
                            <select id="inputJenis" class="w-full border p-2 rounded" required>
                                <option value="Pemasukan">Pemasukan</option>
                                <option value="Pengeluaran">Pengeluaran</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="block text-sm font-medium mb-1">Kategori</label>
                            <input type="text" id="inputKategori" placeholder="Cth: Gaji, Makan, dll" class="w-full border p-2 rounded" required>
                        </div>
                        <div class="mb-3">
                            <label class="block text-sm font-medium mb-1">Nominal (Rp)</label>
                            <input type="number" id="inputNominal" placeholder="Cth: 50000" class="w-full border p-2 rounded" required>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-1">Deskripsi</label>
                            <textarea id="inputDeskripsi" class="w-full border p-2 rounded" rows="2"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition" id="btnSubmit">
                            Simpan Transaksi
                        </button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-sm">
                    <h2 class="text-lg font-bold mb-4 border-b pb-2">Pengeluaran per Kategori</h2>
                    <canvas id="chartPengeluaran"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm lg:col-span-2 overflow-hidden h-fit">
                <div class="flex flex-col md:flex-row justify-between items-center mb-4 border-b pb-2 gap-2">
                    <h2 class="text-lg font-bold">Riwayat Transaksi</h2>
                    
                    <div class="flex gap-2 w-full md:w-auto">
                        <input type="text" id="searchKeyword" placeholder="Cari deskripsi/kategori..." class="border p-2 rounded w-full text-sm">
                        <select id="filterJenis" class="border p-2 rounded text-sm">
                            <option value="">Semua Jenis</option>
                            <option value="Pemasukan">Pemasukan</option>
                            <option value="Pengeluaran">Pengeluaran</option>
                        </select>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 text-sm uppercase">
                                <th class="p-3 border-b">Tanggal</th>
                                <th class="p-3 border-b">Kategori</th>
                                <th class="p-3 border-b">Deskripsi</th>
                                <th class="p-3 border-b">Nominal</th>
                                <th class="p-3 border-b text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelBody" class="text-sm">
                            <tr>
                                <td colspan="5" class="text-center p-4 text-gray-500">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
